type: object
required:
  - type
  - version
  - run
  - posts
properties:
  type:
    const: x_signal_analysis
  version:
    type: integer
  run:
    type: object
    required:
      - run_id
      - start_date
      - end_date
      - account_role
      - parameters
    properties:
      run_id:
        type: string
      start_date:
        type: string
      end_date:
        type: string
      target_username:
        type:
          - string
          - "null"
      account_role:
        enum:
          - benchmark
          - candidate
          - all
      parameters:
        type: object
        required:
          - analysis_version
          - volume_lookback_days
          - forward_return_days
  posts:
    type: array
    items:
      type: object
      required:
        - post_id
        - target_username
        - account_role
        - created_at_jst
        - tweet_url
        - text
        - signals
      properties:
        post_id:
          type: string
        target_username:
          type: string
        account_role:
          enum:
            - benchmark
            - candidate
        signals:
          type: array
          items:
            type: object
            required:
              - sc
              - company_name
              - match_confidence
              - signal_label
              - signal_confidence
              - extraction_rationale
              - signal_rationale
            properties:
              sc:
                type: string
              company_name:
                type: string
              match_confidence:
                enum:
                  - high
                  - medium
                  - low
              signal_label:
                enum:
                  - bullish
                  - non_bullish
                  - irrelevant
              signal_confidence:
                enum:
                  - high
                  - medium
                  - low
